# Base ↔ Instruct model pairs for Exp 04 attractor amplification study.
#
# gamma_l = alpha_eff^IT / alpha_eff^base  (same behavioral vector, both variants)
# asymmetry_index = mean_gamma(unsafe) / mean_gamma(safe)
