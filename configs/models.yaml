models:
  # ── Llama family ────────────────────────────────────────────────────
  # Architecture: pre-norm only (RMSNorm + GQA + SwiGLU + RoPE), consistent
  # across all sizes → K_l approximately scale-invariant (Win.Mean 1.0–1.4).
  # Instruction-tuned variants require higher effective K (RLHF attractor strengthening).
  llama-3.2-1b:
    model_id: "meta-llama/Llama-3.2-1B"
    family: "llama"
    tier: "small"

  llama-3.2-3b:
    model_id: "meta-llama/Llama-3.2-3B"
    family: "llama"
    tier: "small"

  llama-3.1-8b:
    model_id: "meta-llama/Llama-3.1-8B"
    family: "llama"
    tier: "medium"

  # ── Qwen2.5 family ──────────────────────────────────────────────────
  # NOT scale-invariant — different hidden_dim + layer counts per size.
  # 3B: 36 layers, hidden 3072, intermediate 12288 → K_l ≈ 11.4
  # 7B: 28 layers, hidden 3584, intermediate 18944 → K_l ≈ 28.6
  # Profile each size independently. Instruct variants need significantly higher K.
  qwen2.5-3b:
    model_id: "Qwen/Qwen2.5-3B"
    family: "qwen2"
    tier: "small"

  qwen2.5-7b:
    model_id: "Qwen/Qwen2.5-7B"
    family: "qwen2"
    tier: "medium"

  # ── Gemma 2 family ──────────────────────────────────────────────────
  # Double-norm: h_{l+1} = h_l + PostNorm(SubLayer(PreNorm(h_l)))
  # Post-norm clamps sub-layer output to unit scale before residual add →
  # residual norms accumulate faster → K_l ≈ 9.37, strongly scale-invariant
  # (2B vs 9B differ by 0.4%). Architecture is identical across both sizes.
  gemma-2-2b:
    model_id: "google/gemma-2-2b"
    family: "gemma2"
    tier: "small"

  gemma-2-9b:
    model_id: "google/gemma-2-9b"
    family: "gemma2"
    tier: "medium"
