models:
  # ── Llama family ────────────────────────────────────────────────────
  llama-3.2-1b:
    model_id: "meta-llama/Llama-3.2-1B"
    family: "llama"
    notes: "Fast baseline for development and ceiling sweep validation"

  llama-3.1-8b:
    model_id: "meta-llama/Llama-3.1-8B"
    family: "llama"

  # ── Mistral family ──────────────────────────────────────────────────
  mistral-7b:
    model_id: "mistralai/Mistral-7B-v0.1"
    family: "mistral"

  # ── Qwen family ─────────────────────────────────────────────────────
  qwen2.5-1.5b:
    model_id: "Qwen/Qwen2.5-1.5B"
    family: "qwen2"
    notes: "Fast, good for iteration"

  qwen2.5-7b:
    model_id: "Qwen/Qwen2.5-7B"
    family: "qwen2"

  # ── Gemma family ────────────────────────────────────────────────────
  # Gemma2 uses pre+post layernorm per sub-layer, which inflates residual
  # stream norms vs. standard pre-norm models. K_l will be correctly higher.
  # Measurement point (block output) is architecture-agnostic — no formula fix needed.
  gemma-2-2b:
    model_id: "google/gemma-2-2b"
    family: "gemma2"
    notes: "Post-norm arch — expect K_l ~25x higher than Llama at same depth"

  gemma-2-9b:
    model_id: "google/gemma-2-9b"
    family: "gemma2"
